  <text x="105" y="115" class="title">Elarion - Conceito Satélite</text>
  <text x="105" y="155" class="subtitle">Costa, relevo, biomas, ilhas e feridas da Ruptura do Limiar</text>

  <rect x="1930" y="70" width="590" height="270" class="note"/>
  <text x="1965" y="120" class="region">Leitura do mundo</text>
  <text x="1965" y="160" class="small">Verde escuro: florestas e fronteiras.</text>
  <text x="1965" y="195" class="small">Roxo/azul: Zonas de Colapso.</text>
  <text x="1965" y="230" class="small">Linhas claras: serras e rotas naturais.</text>
  <text x="1965" y="265" class="small">Contornos tracejados: áreas bloqueadas.</text>
  <text x="1965" y="300" class="small">Mar largo: navegação futura, não borda falsa.</text>

  <rect x="80" y="1555" width="725" height="220" class="note"/>
  <text x="115" y="1605" class="region">Primeiro bioma para produção</text>
  <text x="115" y="1645" class="small">Refúgio Noroeste: cidade inicial, floresta sombria, costa recortada.</text>
  <text x="115" y="1680" class="small">A zona jogável começa verde/amarela e termina em bloqueios naturais.</text>
  <text x="115" y="1715" class="small">A Ruptura aparece ao longe, mas não domina o tutorial inicial.</text>

  <text x="1300" y="1865" text-anchor="middle" class="tiny">Conceito original derivado da lore de Elarion: Sete Reinos caídos, Ruptura do Limiar, Refúgios, Fronteiras, Ermos e Zonas de Colapso.</text>
