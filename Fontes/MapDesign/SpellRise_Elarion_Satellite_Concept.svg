      .river { fill: none; stroke: #2d6f85; stroke-width: 15; stroke-linecap: round; stroke-linejoin: round; opacity: 0.9; }
      .forest { fill: #153a27; opacity: 0.42; }
      .swamp { fill: #243a2c; opacity: 0.58; }
      .desert { fill: #a88750; opacity: 0.28; }
      .ash { fill: #2a201f; opacity: 0.42; }
      .snow { fill: #d8e3df; opacity: 0.4; }
      .collapse { fill: #5b1f5f; opacity: 0.42; stroke: #d19be8; stroke-width: 3; filter: url(#glow); }
      .liminalLine { fill: none; stroke: #9ad7de; stroke-width: 5; stroke-linecap: round; stroke-dasharray: 15 12; opacity: 0.65; }
      .road { fill: none; stroke: #b79b64; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; opacity: 0.58; }
      .city { fill: #e6d4a5; stroke: #18120d; stroke-width: 5; }
      .portal { fill: #42a3a8; stroke: #071417; stroke-width: 4; }
      .blocked { fill: none; stroke: #e0c474; stroke-width: 4; stroke-dasharray: 18 12; opacity: 0.7; }
      .note { fill: #141917; stroke: #6e6042; stroke-width: 2; opacity: 0.96; }
