      .tiny { font: 400 14px Arial, sans-serif; fill: #c2b397; letter-spacing: 0; }
      .land { stroke: #241b14; stroke-width: 7; filter: url(#shadow); }
      .coast { fill: none; stroke: #d6be84; stroke-width: 5; opacity: 0.52; }
      .mountain { fill: none; stroke: #5d6158; stroke-width: 24; stroke-linecap: round; stroke-linejoin: round; opacity: 0.78; }
      .river { fill: none; stroke: #245a70; stroke-width: 18; stroke-linecap: round; stroke-linejoin: round; opacity: 0.86; }
      .route { fill: none; stroke: #b69b65; stroke-width: 13; stroke-linecap: round; stroke-linejoin: round; opacity: 0.76; }
      .seaRoute { fill: none; stroke: #7eb0bd; stroke-width: 8; stroke-linecap: round; stroke-dasharray: 22 18; opacity: 0.72; }
      .locked { fill: #000000; opacity: 0.28; stroke: #111111; stroke-width: 3; stroke-dasharray: 14 12; }
      .green { fill: #2b7a42; opacity: 0.34; stroke: #8ee19c; stroke-width: 3; }
      .yellow { fill: #c7a333; opacity: 0.29; stroke: #e7d275; stroke-width: 3; }
      .red { fill: #9e352f; opacity: 0.29; stroke: #d06a5e; stroke-width: 3; }
      .black { fill: #070707; opacity: 0.48; stroke: #b9a170; stroke-width: 3; }
      .city { fill: #e8d8ad; stroke: #19140f; stroke-width: 5; }
      .portal { fill: #43a1a7; stroke: #071417; stroke-width: 4; }
      .note { fill: #151a18; stroke: #695a3d; stroke-width: 2; opacity: 0.95; }
    </style>
