  <text x="105" y="1560" class="small">Começar no noroeste da pangeia.</text>
  <text x="105" y="1595" class="small">Um bioma: floresta dark fantasy + costa.</text>
  <text x="105" y="1630" class="small">Uma cidade racial, zona verde e faixa amarela.</text>
  <text x="105" y="1665" class="small">Resto do mundo existe no macro, mas fica bloqueado.</text>

  <text x="1210" y="1710" text-anchor="middle" class="tiny">Mapa original do SpellRise. Referências usadas como direção: Darkfall Unholy Wars, Mortal Online 2, Game of Thrones e geografia real costeira.</text>
